version: 1
slice: portal_initial_micro_universe
status_values:
  - implemented
  - deferred
  - not_started
rules:
  - rule_key: game_setup_minimal
    source_rules:
      - "103"
    status: implemented
    scope: Minimal two-player game setup for the declared active `Portal` support slice.
    engine_contracts:
      - docs/contracts/game-state.md
      - docs/contracts/play-engine.md
      - docs/contracts/deterministic-game-setup.md
    tests:
      - engine/tests/test_setup.py
    notes: "Ignore unsupported setup complexity until broader card support exists."
  - rule_key: turn_structure_minimal
    source_rules:
      - "500"
    status: implemented
    scope: Turn progression through cleanup plus handoff into the next active player's precombat main, including draw when library content exists.
    engine_contracts:
      - docs/contracts/game-state.md
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
    tests:
      - engine/tests/test_turns.py
      - engine/tests/test_spells.py
    notes: "Broader long-run loop completion and unsupported branches remain future work."
  - rule_key: precombat_priority_minimal
    source_rules:
      - "117"
      - "505"
    status: implemented
    scope: Precombat main-step action enumeration for the active player, plus forced-pass handling for the currently unsupported opposing branch.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_turns.py
      - engine/tests/test_spells.py
    notes: "Current support is intentionally narrow: play land, activate a declared basic land, cast a vanilla creature spell, cast the supported `Vengeance`, `Path of Peace`, `Touch of Brilliance`, or `Time Ebb` sorcery, advance to combat, or pass priority."
  - rule_key: combat_action_windows_minimal
    source_rules:
      - "508"
      - "509"
    status: implemented
    scope: Explicit action enumeration for attacker declaration and blocker declaration in the declared support slice.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_combat.py
    notes: "Current support enumerates legal subsets of attackers and blocker assignments for the available vanilla creatures."
  - rule_key: land_playing_minimal
    source_rules:
      - "305"
    status: implemented
    scope: Playing the five Portal basic lands in the declared support slice.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_turns.py
    notes: ""
  - rule_key: mana_generation_basic
    source_rules:
      - "106"
      - "605"
    status: implemented
    scope: Basic mana production sufficient for the five Portal basic lands.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_turns.py
    notes: "Current support covers one-color intrinsic mana production for Plains, Island, Swamp, Mountain, and Forest."
  - rule_key: creature_spells_minimal
    source_rules:
      - "601"
      - "608"
    status: implemented
    scope: Casting and resolving vanilla creature spells from the declared support slice, currently proven for Border Guard, Foot Soldiers, and Muck Rats.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_spells.py
      - engine/tests/test_combat.py
    notes: "Implemented for vanilla creature spells from hand to stack to battlefield using available mana in the active player's precombat main step."
  - rule_key: targeted_sorcery_spells_minimal
    source_rules:
      - "115"
      - "601"
      - "608"
    status: implemented
    scope: Casting and resolving the supported `Portal` sorceries `Vengeance` and `Path of Peace`, including choosing a legal creature target, applying the declared destruction effect, applying `Path of Peace` owner life gain, and moving the spell from stack to graveyard.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_spells.py
      - engine/tests/test_replay_log.py
    notes: "Current support is intentionally narrow and name-scoped to `Vengeance` and `Path of Peace`, without claiming broader damage, prevention, or effect-layer support."
  - rule_key: simple_card_draw_sorceries_minimal
    source_rules:
      - "601"
      - "608"
    status: implemented
    scope: Casting and resolving the supported `Portal` sorcery `Touch of Brilliance`, drawing exactly two cards for the caster, and moving the spell from stack to graveyard.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_spells.py
      - engine/tests/test_turns.py
    notes: "Current support is intentionally narrow and name-scoped to `Touch of Brilliance` with oracle text `Draw two cards.`"
  - rule_key: targeted_battlefield_to_library_sorceries_minimal
    source_rules:
      - "115"
      - "601"
      - "608"
    status: implemented
    scope: Casting and resolving the supported `Portal` sorcery `Time Ebb`, choosing a creature target, putting that creature on top of its owner's library, and moving the spell from stack to graveyard.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_spells.py
      - engine/tests/test_replay_log.py
    notes: "Current support is intentionally narrow and name-scoped to `Time Ebb` with oracle text `Put target creature on top of its owner's library.`"
  - rule_key: combat_minimal
    source_rules:
      - "506"
      - "508"
      - "509"
      - "510"
      - "511"
    status: implemented
    scope: Basic attack, multi-block declaration on a single attacker, and combat-damage flow for creatures without keywords.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_combat.py
      - engine/tests/test_replay_log.py
    notes: "Multiple blockers per attacker are supported. Attacker-side damage assignment still follows the listed blocker order without a separate player-choice action."
  - rule_key: zones_minimal
    source_rules:
      - "400"
    status: implemented
    scope: Library, hand, battlefield, and empty graveyard/stack initialization, plus supported library-to-hand and hand-to-battlefield movement.
    engine_contracts:
      - docs/contracts/game-state.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_setup.py
      - engine/tests/test_turns.py
    notes: "Supported movement currently includes library-to-hand, hand-to-battlefield, hand-to-stack, stack-to-battlefield, stack-to-graveyard, battlefield-to-graveyard, and battlefield-to-library-top."
  - rule_key: state_based_actions_minimal
    source_rules:
      - "704"
    status: implemented
    scope: Only the subset required for lethal combat damage and creature death from explicitly marked creature damage.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_combat.py
      - engine/tests/test_replay_log.py
    notes: "Implemented via explicit damage marking plus SBA checks. The current lethal-damage proof now uses real combat via Border Guard versus Muck Rats."
  - rule_key: keyword_abilities
    source_rules: []
    status: deferred
    scope: No keyword ability support in the initial support slice.
    engine_contracts:
      - docs/contracts/play-engine.md
    tests: []
    notes: "Expand only when future cards require it."
