rules:
  - {rule_key: alabaster_dragon_death_trigger_minimal, source_rules: ["603", "700.4", "701.20"], status: implemented, scope: "Only Alabaster Dragon's printed dies trigger: after it moves from the battlefield to its owner's graveyard, put the captured trigger on the stack; on resolution, return that card to its owner's library and shuffle that library using the deterministic shuffle contract.", engine_contracts: [docs/contracts/stack-and-priority.md, docs/contracts/object-identity-and-zone-changes.md, docs/contracts/deterministic-rng-and-shuffle.md], tests: [engine/tests/test_wave3.py], notes: "Name-scoped triggered-ability foundation; no general triggered-ability claim."}
  - {rule_key: instant_priority_minimal, source_rules: ["117", "608"], status: implemented, scope: "Attackers-step priority window for declared instant responses; Treetop Defense requires its controller to have been attacked in that combat.", engine_contracts: [docs/contracts/stack-and-priority.md], tests: [engine/tests/test_wave2.py], notes: "Two-player Wave 2 boundary."}
  - {rule_key: combat_restrictions_minimal, source_rules: ["508", "509", "702"], status: implemented, scope: "Shared attack and block legality for the Wave 2 restrictions and the Wave 3 flying-only blocker restriction.", engine_contracts: [docs/contracts/combat-requirements-and-evasion.md], tests: [engine/tests/test_wave2.py, engine/tests/test_wave3.py], notes: "Enumeration and direct declarations share the same predicates; Cloud Dragon, Cloud Pirates, and Cloud Spirit block only Flying creatures."}
  - {rule_key: islandwalk_keyword_minimal, source_rules: ["702.14", "509"], status: implemented, scope: "Only the Islandwalk subset required for Bull Hippo: it cannot be blocked while the defending player controls an Island.", engine_contracts: [docs/contracts/combat-requirements-and-evasion.md], tests: [engine/tests/test_wave3.py], notes: "Uses the shared landwalk-aware combat-legality path without broadening landwalk beyond Swampwalk, Forestwalk, and Islandwalk."}
  - {rule_key: forestwalk_keyword_minimal, source_rules: ["702.14", "509"], status: implemented, scope: "Only the Forestwalk subset required for Elite Cat Warrior: it cannot be blocked while the defending player controls a Forest.", engine_contracts: [docs/contracts/combat-requirements-and-evasion.md], tests: [engine/tests/test_wave3.py], notes: "Nature's Cloak temporarily grants the same bounded evasion; this entry records Elite Cat Warrior's permanent keyword support."}
  - {rule_key: vigilance_keyword_minimal, source_rules: ["702.20", "508"], status: implemented, scope: "Only the Vigilance subset required for Archangel and Ardent Militia: declaring either creature as an attacker does not tap it.", engine_contracts: [docs/contracts/combat-requirements-and-evasion.md], tests: [engine/tests/test_wave3.py], notes: "The creature remains eligible to block later in the combat."}
  - {rule_key: combat_requirements_minimal, source_rules: ["509.1"], status: implemented, scope: "Object-bound must-block requirements constrain both blocker enumeration and submitted declarations through cleanup.", engine_contracts: [docs/contracts/combat-requirements-and-evasion.md], tests: [engine/tests/test_priority.py], notes: "Alluring Scent."}
  - {rule_key: additional_land_plays_minimal, source_rules: ["305.2", "611"], status: implemented, scope: "Summer Bloom expands the caster land-play limit from one to four for this turn, then cleanup resets it to one.", engine_contracts: [docs/contracts/game-state.md], tests: [engine/tests/test_portal_expansion_wave.py], notes: "Turn-bounded allowance."}
  - {rule_key: tutor_search_shuffle_sorceries_minimal, source_rules: ["701.19", "701.20", "608"], status: implemented, scope: "Personal Tutor and Sylvan Tutor create a chooser-owned hidden decision, reveal one matching card, shuffle deterministically, and put it on top.", engine_contracts: [docs/contracts/deterministic-choices-and-hidden-zones.md, docs/contracts/deterministic-rng-and-shuffle.md], tests: [engine/tests/test_portal_expansion_wave.py], notes: "No ambient RNG or hidden-zone leakage."}
  - {rule_key: graveyard_type_return_sorceries_minimal, source_rules: ["115", "608"], status: implemented, scope: "Breath of Life returns a creature card to battlefield; Déjà Vu returns a sorcery card to hand.", engine_contracts: [docs/contracts/object-identity-and-zone-changes.md], tests: [engine/tests/test_portal_expansion_wave.py], notes: "Owner-bound graveyard targets and fresh zone identity."}
  - {rule_key: targeted_count_sorceries_minimal, source_rules: ["115", "608"], status: implemented, scope: "Renewing Dawn and Theft of Dreams count qualifying permanents controlled by their target opponent on resolution.", engine_contracts: [docs/contracts/portal-sorcery-expansion-wave.md], tests: [engine/tests/test_portal_expansion_wave.py], notes: "Name-scoped target-derived values."}
  - {rule_key: subtype_count_sorceries_minimal, source_rules: ["608"], status: implemented, scope: "Spitting Earth counts controller Mountains; Fruition counts every Forest at resolution.", engine_contracts: [docs/contracts/portal-sorcery-expansion-wave.md], tests: [engine/tests/test_portal_expansion_wave.py], notes: "Name-scoped subtype counts."}
  - {rule_key: x_cost_sorceries_minimal, source_rules: ["107.3", "601.2b", "608"], status: implemented, scope: "Hurricane preserves a nonnegative chosen X from cast through resolution.", engine_contracts: [docs/contracts/costs-and-x-values.md], tests: [engine/tests/test_portal_expansion_wave.py], notes: "Name-scoped X spell."}
  - {rule_key: mass_damage_players_minimal, source_rules: ["608", "704"], status: implemented, scope: "Dry Spell and Fire Tempest damage every creature and player before one SBA check.", engine_contracts: [docs/contracts/portal-sorcery-expansion-wave.md], tests: [engine/tests/test_portal_expansion_wave.py], notes: "Atomic packet."}
  - {rule_key: filtered_mass_destruction_minimal, source_rules: ["608", "701.7"], status: implemented, scope: "Color- and subtype-filtered permanent destruction.", engine_contracts: [docs/contracts/portal-sorcery-expansion-wave.md], tests: [engine/tests/test_spells.py], notes: "Name-scoped Portal effects."}
  - {rule_key: temporary_characteristics_minimal, source_rules: ["613", "704"], status: implemented, scope: "Burning Cloak and Monstrous Growth apply object-bound temporary P/T changes and cleanup expiry.", engine_contracts: [docs/contracts/characteristics-and-continuous-effects.md], tests: [engine/tests/test_portal_expansion_wave.py], notes: "Additive modifiers only."}
  - {rule_key: combined_damage_life_sorceries_minimal, source_rules: ["115", "608", "704"], status: implemented, scope: "Soul Shred, Vampiric Touch, and Vampiric Feast combine legal damage targets with caster life gain.", engine_contracts: [docs/contracts/portal-sorcery-expansion-wave.md], tests: [engine/tests/test_portal_expansion_wave.py], notes: "Name-scoped."}
  - {rule_key: temporary_power_sorceries_minimal, source_rules: ["611"], status: implemented, scope: "Howling Fury grants +4 power through cleanup or zone change.", engine_contracts: [docs/contracts/portal-sorcery-expansion-wave.md], tests: [engine/tests/test_portal_expansion_wave.py], notes: "Name-scoped."}
  - {rule_key: mass_creature_damage_sorceries_minimal, source_rules: ["608", "704"], status: implemented, scope: "Pyroclasm and Needle Storm batch creature damage then run one SBA check.", engine_contracts: [docs/contracts/portal-sorcery-expansion-wave.md], tests: [engine/tests/test_portal_expansion_wave.py], notes: "Needle Storm filters creatures with Flying."}
  - {rule_key: mass_status_sorceries_minimal, source_rules: ["608"], status: implemented, scope: "Mobilize untaps caster-controlled creatures; Blinding Light taps nonwhite creatures.", engine_contracts: [docs/contracts/portal-sorcery-expansion-wave.md], tests: [engine/tests/test_spells.py], notes: "Name-scoped."}
  - {rule_key: graveyard_return_sorceries_minimal, source_rules: ["115", "608"], status: implemented, scope: "Raise Dead and Elven Cache return a legal card from the caster's graveyard to hand.", engine_contracts: [docs/contracts/portal-sorcery-expansion-wave.md], tests: [engine/tests/test_portal_expansion_wave.py], notes: "Name-scoped."}
  - {rule_key: targeted_player_life_gain_sorceries_minimal, source_rules: ["115", "608"], status: implemented, scope: "Natural Spring targets one player and grants 8 life.", engine_contracts: [docs/contracts/portal-sorcery-expansion-wave.md], tests: [engine/tests/test_spells.py], notes: "Name-scoped."}
  - {rule_key: creature_or_land_destruction_sorceries_minimal, source_rules: ["115", "608", "701.7"], status: implemented, scope: "Lava Flow destroys one target creature or land.", engine_contracts: [docs/contracts/portal-sorcery-expansion-wave.md], tests: [engine/tests/test_spells.py], notes: "Name-scoped."}
  - rule_key: game_setup_minimal
