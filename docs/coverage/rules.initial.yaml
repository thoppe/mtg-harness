version: 1
slice: portal_initial_micro_universe
status_values:
  - implemented
  - deferred
  - not_started
rules:
  - rule_key: game_setup_minimal
    source_rules:
      - "103"
    status: implemented
    scope: Minimal two-player game setup for the declared active `Portal` support slice.
    engine_contracts:
      - docs/contracts/game-state.md
      - docs/contracts/play-engine.md
      - docs/contracts/deterministic-game-setup.md
    tests:
      - engine/tests/test_setup.py
    notes: "Ignore unsupported setup complexity until broader card support exists."
  - rule_key: turn_structure_minimal
    source_rules:
      - "500"
    status: implemented
    scope: Turn progression through cleanup plus handoff into the next active player's precombat main, including draw when library content exists.
    engine_contracts:
      - docs/contracts/game-state.md
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
    tests:
      - engine/tests/test_turns.py
      - engine/tests/test_spells.py
    notes: "Broader long-run loop completion and unsupported branches remain future work."
  - rule_key: precombat_priority_minimal
    source_rules:
      - "117"
      - "505"
    status: implemented
    scope: Precombat main-step action enumeration for the active player, plus forced-pass handling for the currently unsupported opposing branch.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_turns.py
      - engine/tests/test_spells.py
    notes: "Current support is intentionally narrow: play land, activate a declared basic land, cast a supported creature spell including `Armored Pegasus`, `Wind Drake`, `Bog Imp`, and `Storm Crow`, cast the supported `Vengeance`, `Path of Peace`, `Touch of Brilliance`, `Time Ebb`, `Volcanic Hammer`, `Lava Axe`, `Mind Rot`, `Winter's Grasp`, `Symbol of Unsummoning`, `Armageddon`, `Rain of Salt`, `Wrath of God`, or `Rain of Daggers` sorcery, advance to combat, or pass priority."
  - rule_key: combat_action_windows_minimal
    source_rules:
      - "508"
      - "509"
    status: implemented
    scope: Explicit action enumeration for attacker declaration and blocker declaration in the declared support slice.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_combat.py
    notes: "Current support enumerates legal subsets of attackers and blocker assignments for the available creatures, including defender-based attack exclusion for `Wall of Granite`."
  - rule_key: defender_keyword_minimal
    source_rules:
      - "702.3"
      - "508"
    status: implemented
    scope: Only the subset of defender required for `Wall of Granite`, namely that a creature with defender cannot be declared as an attacker in the current support slice.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_combat.py
      - engine/tests/test_priority.py
      - engine/tests/test_spells.py
    notes: "Current support is intentionally narrow and limited to defender-based attack legality for the supported Portal card `Wall of Granite`."
  - rule_key: land_playing_minimal
    source_rules:
      - "305"
    status: implemented
    scope: Playing the five Portal basic lands in the declared support slice.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_turns.py
    notes: ""
  - rule_key: mana_generation_basic
    source_rules:
      - "106"
      - "605"
    status: implemented
    scope: Basic mana production sufficient for the five Portal basic lands.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_turns.py
    notes: "Current support covers one-color intrinsic mana production for Plains, Island, Swamp, Mountain, and Forest."
  - rule_key: creature_spells_minimal
    source_rules:
      - "601"
      - "608"
    status: implemented
    scope: Casting and resolving creature spells from the declared support slice, currently proven for Border Guard, Foot Soldiers, Muck Rats, Armored Pegasus, Wind Drake, Bog Imp, Storm Crow, and Wall of Granite.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_spells.py
      - engine/tests/test_combat.py
    notes: "Implemented for the supported creature spells from hand to stack to battlefield using available mana in the active player's precombat main step."
  - rule_key: targeted_sorcery_spells_minimal
    source_rules:
      - "115"
      - "601"
      - "608"
    status: implemented
    scope: Casting and resolving the supported `Portal` sorceries `Vengeance` and `Path of Peace`, including choosing a legal creature target, applying the declared destruction effect, applying `Path of Peace` owner life gain, and moving the spell from stack to graveyard.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_spells.py
      - engine/tests/test_replay_log.py
    notes: "Current support is intentionally narrow and name-scoped to `Vengeance` and `Path of Peace`, without claiming broader damage, prevention, or effect-layer support."
  - rule_key: simple_card_draw_sorceries_minimal
    source_rules:
      - "601"
      - "608"
    status: implemented
    scope: Casting and resolving the supported `Portal` sorcery `Touch of Brilliance`, drawing exactly two cards for the caster, and moving the spell from stack to graveyard.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_spells.py
      - engine/tests/test_turns.py
    notes: "Current support is intentionally narrow and name-scoped to `Touch of Brilliance` with oracle text `Draw two cards.`"
  - rule_key: targeted_battlefield_to_library_sorceries_minimal
    source_rules:
      - "115"
      - "601"
      - "608"
    status: implemented
    scope: Casting and resolving the supported `Portal` sorcery `Time Ebb`, choosing a creature target, putting that creature on top of its owner's library, and moving the spell from stack to graveyard.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_spells.py
      - engine/tests/test_replay_log.py
    notes: "Current support is intentionally narrow and name-scoped to `Time Ebb` with oracle text `Put target creature on top of its owner's library.`"
  - rule_key: targeted_damage_sorceries_minimal
    source_rules:
      - "115"
      - "120"
      - "601"
      - "608"
      - "704"
    status: implemented
    scope: Casting and resolving the supported `Portal` sorceries `Volcanic Hammer` and `Lava Axe`, choosing a legal target in the current slice, dealing the declared amount of damage, applying player life-total changes or creature damage marking, and running the existing lethal-damage SBA path when needed.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_spells.py
      - engine/tests/test_replay_log.py
    notes: "Current support is intentionally narrow and name-scoped to `Volcanic Hammer` and `Lava Axe`, omitting planeswalker targets, prevention, replacement, and redirection effects."
  - rule_key: targeted_discard_sorceries_minimal
    source_rules:
      - "115"
      - "701.8"
      - "601"
      - "608"
    status: implemented
    scope: Casting and resolving the supported `Portal` sorcery `Mind Rot`, choosing a player target, and making that player discard two cards using deterministic hand-order selection in the current slice.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_spells.py
      - engine/tests/test_replay_log.py
    notes: "Current support is intentionally narrow and name-scoped to `Mind Rot`, with a documented v0 simplification that the target player discards the first two cards in hand order rather than making a separate choice."
  - rule_key: targeted_land_destruction_sorceries_minimal
    source_rules:
      - "115"
      - "601"
      - "608"
    status: implemented
    scope: Casting and resolving the supported `Portal` sorcery `Winter's Grasp`, choosing a land target on the battlefield, destroying that land, and moving the spell from stack to graveyard.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_spells.py
      - engine/tests/test_replay_log.py
    notes: "Current support is intentionally narrow and name-scoped to `Winter's Grasp`, without implying broader permanent-destruction or land-rule support."
  - rule_key: fixed_multi_target_land_destruction_sorceries_minimal
    source_rules:
      - "115"
      - "601"
      - "608"
    status: implemented
    scope: Casting and resolving the supported `Portal` sorcery `Rain of Salt`, choosing exactly two distinct land targets on the battlefield, destroying those lands, and moving the spell from stack to graveyard.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_spells.py
      - engine/tests/test_replay_log.py
    notes: "Current support is intentionally narrow and name-scoped to `Rain of Salt`, establishing only the minimal two-distinct-land-target spell path rather than generalized arbitrary target-count support."
  - rule_key: targeted_battlefield_to_hand_sorceries_minimal
    source_rules:
      - "115"
      - "601"
      - "608"
    status: implemented
    scope: Casting and resolving the supported `Portal` sorcery `Symbol of Unsummoning`, choosing a creature target on the battlefield, returning that creature to its owner's hand, drawing one card for the caster, and moving the spell from stack to graveyard.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_spells.py
      - engine/tests/test_replay_log.py
    notes: "Current support is intentionally narrow and name-scoped to `Symbol of Unsummoning`, while establishing the reusable battlefield-to-hand sorcery path for future cards."
  - rule_key: global_land_destruction_sorceries_minimal
    source_rules:
      - "601"
      - "608"
      - "701.7"
    status: implemented
    scope: Casting and resolving the supported `Portal` sorcery `Armageddon`, destroying all lands on the battlefield, and moving the spell from stack to graveyard.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_spells.py
      - engine/tests/test_replay_log.py
    notes: "Current support is intentionally narrow and name-scoped to `Armageddon`, without implying a broader mass-destruction framework."
  - rule_key: global_creature_destruction_sorceries_minimal
    source_rules:
      - "601"
      - "608"
      - "701.7"
    status: implemented
    scope: Casting and resolving the supported `Portal` sorcery `Wrath of God`, destroying all creatures on the battlefield, ignoring the printed regeneration rider in the current slice, and moving the spell from stack to graveyard.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_spells.py
      - engine/tests/test_replay_log.py
    notes: "Current support is intentionally narrow and name-scoped to `Wrath of God`, with the regeneration rider documented as out of scope because regeneration is otherwise unsupported."
  - rule_key: opponent_mass_creature_destruction_sorceries_minimal
    source_rules:
      - "115"
      - "601"
      - "608"
      - "701.7"
    status: implemented
    scope: Casting and resolving `Rain of Daggers` in the current two-player slice by targeting the opposing player, destroying all creatures that player controls, counting how many were destroyed that way, applying 2 life loss to the caster for each, and moving the spell from stack to graveyard.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_spells.py
      - engine/tests/test_replay_log.py
    notes: "Current support is intentionally narrow and name-scoped to `Rain of Daggers`, limited to two-player opponent targeting and omitting regeneration, replacement effects, and multiplayer opponent selection."
  - rule_key: flying_keyword_minimal
    source_rules:
      - "702.9"
      - "509"
    status: implemented
    scope: Only the subset of flying required for `Armored Pegasus`, `Wind Drake`, `Bog Imp`, and `Storm Crow`, namely that creatures without flying cannot block those attackers in the current support slice.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_combat.py
      - engine/tests/test_priority.py
      - engine/tests/test_spells.py
    notes: "Current support is intentionally narrow and limited to flying-based block legality for the supported Portal cards `Armored Pegasus`, `Wind Drake`, `Bog Imp`, and `Storm Crow`."
  - rule_key: combat_minimal
    source_rules:
      - "506"
      - "508"
      - "509"
      - "510"
      - "511"
    status: implemented
    scope: Basic attack, multi-block declaration on a single attacker, and combat-damage flow for creatures without keywords.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_combat.py
      - engine/tests/test_replay_log.py
    notes: "Multiple blockers per attacker are supported. Attacker-side damage assignment still follows the listed blocker order without a separate player-choice action."
  - rule_key: zones_minimal
    source_rules:
      - "400"
    status: implemented
    scope: Library, hand, battlefield, and empty graveyard/stack initialization, plus supported library-to-hand and hand-to-battlefield movement.
    engine_contracts:
      - docs/contracts/game-state.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_setup.py
      - engine/tests/test_turns.py
    notes: "Supported movement currently includes library-to-hand, hand-to-battlefield, hand-to-stack, stack-to-battlefield, stack-to-graveyard, battlefield-to-graveyard, and battlefield-to-library-top."
  - rule_key: state_based_actions_minimal
    source_rules:
      - "704"
    status: implemented
    scope: Only the subset required for lethal creature damage and creature death from explicitly marked combat or spell damage.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_combat.py
      - engine/tests/test_replay_log.py
    notes: "Implemented via explicit damage marking plus SBA checks for both combat and the currently supported direct-damage sorceries."
  - rule_key: keyword_abilities
    source_rules: []
    status: deferred
    scope: Keyword abilities beyond the minimal flying support required by `Armored Pegasus`, `Wind Drake`, `Bog Imp`, and `Storm Crow` and the minimal defender support required by `Wall of Granite` remain unsupported in the initial support slice.
    engine_contracts:
      - docs/contracts/play-engine.md
    tests: []
    notes: "Expand only when future cards require it."
