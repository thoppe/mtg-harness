    tests:
      - engine/tests/test_priority.py
      - engine/tests/test_turns.py
      - engine/tests/test_spells.py
    notes: "Current support is intentionally narrow: play land, activate a declared basic land, cast a supported creature spell including `Armored Pegasus`, `Wind Drake`, `Bog Imp`, `Storm Crow`, `Keen-Eyed Archers`, and `Anaconda`, cast the supported `Vengeance`, `Path of Peace`, `Hand of Death`, `Touch of Brilliance`, `Time Ebb`, `Tidal Surge`, `Volcanic Hammer`, `Lava Axe`, `Mind Rot`, `Winter's Grasp`, `Symbol of Unsummoning`, `Armageddon`, `Rain of Salt`, `Sacred Nectar`, `Wrath of God`, or `Rain of Daggers` sorcery, advance to combat, or pass priority."
