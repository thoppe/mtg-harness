version: 1
slice: portal_initial_micro_universe
status_values:
  - implemented
  - deferred
  - not_started
rules:
  - rule_key: game_setup_minimal
    source_rules:
      - "103"
    status: implemented
    scope: Minimal two-player game setup for the declared `Portal` micro-universe.
    engine_contracts:
      - docs/contracts/game-state.md
      - docs/contracts/play-engine.md
      - docs/contracts/deterministic-game-setup.md
    tests:
      - engine/tests/test_setup.py
    notes: "Ignore unsupported setup complexity until broader card support exists."
  - rule_key: turn_structure_minimal
    source_rules:
      - "500"
    status: implemented
    scope: Turn progression through cleanup plus handoff into the next active player's precombat main, including draw when library content exists.
    engine_contracts:
      - docs/contracts/game-state.md
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
    tests:
      - engine/tests/test_turns.py
    notes: "Broader long-run loop completion and unsupported branches remain future work."
  - rule_key: land_playing_minimal
    source_rules:
      - "305"
    status: implemented
    scope: Playing Plains as the initial slice's only land card.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_turns.py
    notes: ""
  - rule_key: mana_generation_basic
    source_rules:
      - "106"
      - "605"
    status: implemented
    scope: Basic mana production sufficient for Plains.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_turns.py
    notes: "Only white mana production is required initially."
  - rule_key: creature_spells_minimal
    source_rules:
      - "601"
      - "608"
    status: implemented
    scope: Casting and resolving Border Guard as a creature spell.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_turns.py
      - engine/tests/test_replay_log.py
      - engine/tests/test_spells.py
    notes: "Implemented for vanilla creature spells from hand to stack to battlefield using available mana in the active player's precombat main step."
  - rule_key: combat_minimal
    source_rules:
      - "506"
      - "508"
      - "509"
      - "510"
      - "511"
    status: implemented
    scope: Basic attack, single-blocker declaration, and combat-damage flow for creatures without keywords.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_combat.py
      - engine/tests/test_replay_log.py
    notes: "The supported subset currently allows at most one blocker per attacker."
  - rule_key: zones_minimal
    source_rules:
      - "400"
    status: implemented
    scope: Library, hand, battlefield, and empty graveyard/stack initialization, plus supported library-to-hand and hand-to-battlefield movement.
    engine_contracts:
      - docs/contracts/game-state.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_setup.py
      - engine/tests/test_turns.py
    notes: "Supported movement currently includes library-to-hand, hand-to-battlefield, hand-to-stack, stack-to-battlefield, and battlefield-to-graveyard."
  - rule_key: state_based_actions_minimal
    source_rules:
      - "704"
    status: implemented
    scope: Only the subset required for lethal combat damage and creature death from explicitly marked creature damage.
    engine_contracts:
      - docs/contracts/play-engine.md
      - docs/contracts/state-machine-transitions.md
      - docs/contracts/replay-event-log.md
    tests:
      - engine/tests/test_combat.py
      - engine/tests/test_replay_log.py
    notes: "Implemented via explicit damage marking plus SBA checks; cleanup-time damage removal remains future work."
  - rule_key: keyword_abilities
    source_rules: []
    status: deferred
    scope: No keyword ability support in the initial micro-universe.
    engine_contracts:
      - docs/contracts/play-engine.md
    tests: []
    notes: "Expand only when future cards require it."
